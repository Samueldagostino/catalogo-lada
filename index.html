<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Catálogo Lada</title>
<meta name="description" content="Catálogo de productos de acero y construcción — LADA Venezuela" />
<meta name="theme-color" content="#0a0f0c" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Archivo', 'Segoe UI', sans-serif;
    background: #0a0f0c;
    color: #e8ede9;
    min-height: 100vh;

  }

  ::-webkit-scrollbar-track { background: #0a0f0c; }
  ::-webkit-scrollbar-thumb { background: #1a7a3a55; border-radius: 3px; }
  input::placeholder { color: #3a5a40; }
  input:focus { border-color: #1a7a3a !important; outline: none; }
  .app { max-width: 520px; margin: 0 auto; position: relative; min-height: 100vh; }
  .header {
    background: linear-gradient(135deg, #0d1a10 0%, #132918 100%);
    border-bottom: 2px solid #1a7a3a; padding: 14px 20px;
    position: sticky; top: 0; z-index: 100;

  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .logo { font-size: 28px; font-weight: 900; letter-spacing: 6px; color: #2ecc40; text-transform: uppercase; cursor: pointer; }
  .subtitle { font-size: 11px; color: #5a8a62; letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    background: none; border: 1px solid #1a7a3a55; color: #5ebd6e;
    padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 18px;
    transition: all 0.2s; position: relative;
  }
  .icon-btn:hover, .icon-btn.active { background: #1a7a3a33; border-color: #1a7a3a; color: #2ecc40; }
  .cart-badge {
    position: absolute; top: -6px; right: -6px; background: #e74c3c; color: #fff;
    font-size: 10px; font-weight: 800; min-width: 18px; height: 18px;
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
    padding: 0 4px; line-height: 1;
  }
  .search-box {
    width: 100%; padding: 10px 14px; background: #111a14;
    border: 1px solid #1a7a3a44; border-radius: 6px; color: #e8ede9;
    font-size: 14px; outline: none; margin-top: 10px; font-family: inherit;
  }
  .nav { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .nav-btn {
    background: none; border: 1px solid #1a7a3a55; color: #5ebd6e;
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
    font-weight: 600; font-family: inherit; transition: all 0.15s;
  }
  .nav-btn:hover { border-color: #1a7a3a; }
  .nav-btn.active { background: #1a7a3a33; border-color: #1a7a3a; color: #2ecc40; }
  .nav-sep { color: #1a7a3a55; font-size: 12px; }
  .body { padding: 16px 16px 80px; }
  .home-intro { text-align: center; padding: 20px 0 28px; }
  .home-intro p { font-size: 15px; color: #7a9a80; line-height: 1.5; }
  .cat-card {
    background: linear-gradient(135deg, #111a14 0%, #162119 100%);
    border: 1px solid #1a7a3a33; border-radius: 12px; padding: 20px;
    margin-bottom: 12px; cursor: pointer; transition: all 0.2s;
  }
  .cat-card:hover { border-color: #1a7a3a; transform: translateY(-2px); }
  .cat-card:active { transform: translateY(0); }
  .cat-icon { font-size: 36px; display: block; margin-bottom: 8px; }
  .cat-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .cat-title { font-size: 18px; font-weight: 800; color: #2ecc40; margin-bottom: 4px; }
  .cat-desc { font-size: 13px; color: #7a9a80; }
  .badge { background: #1a7a3a33; color: #2ecc40; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .sub-card {
    background: #111a14; border: 1px solid #1a7a3a22; border-radius: 10px;
    padding: 14px; margin-bottom: 10px; cursor: pointer;
    display: flex; align-items: center; gap: 14px; transition: all 0.2s;
  }
  .sub-card:hover { border-color: #1a7a3a; }
  .sub-card:active { background: #162119; }
  .sub-name { font-size: 16px; font-weight: 700; color: #d4e5d7; }
  .sub-count { font-size: 12px; color: #5a8a62; margin-top: 2px; }
  .sub-arrow { color: #1a7a3a; font-size: 20px; flex-shrink: 0; }
  .section-title { font-size: 20px; font-weight: 800; color: #2ecc40; margin-bottom: 16px; border-bottom: 2px solid #1a7a3a44; padding-bottom: 8px; }
  .group-label { font-size: 13px; font-weight: 700; color: #1a7a3a; background: #1a7a3a22; padding: 6px 12px; border-radius: 6px; margin-bottom: 10px; display: inline-block; }
  .subcat-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .subcat-header .section-title { margin: 0; border: none; padding: 0; }
  .product-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; background: #0d1610; border-radius: 8px;
    margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
  }
  .product-row:hover { border-color: #1a7a3a55; background: #121e16; }
  .product-row:active { background: #1a2a1e; }
  .p-size { font-size: 14px; font-weight: 600; color: #d4e5d7; }
  .p-dim { font-size: 11px; color: #5a8a62; margin-top: 2px; }
  .p-price { font-size: 16px; font-weight: 800; color: #2ecc40; text-align: right; white-space: nowrap; }
  .p-price.consultar { font-size: 14px; font-weight: 700; color: #c7963a; font-style: italic; }
  .detail-box { background: #111a14; border-radius: 16px; border: 1px solid #1a7a3a33; overflow: hidden; }
  .detail-img { display: flex; justify-content: center; padding: 24px; background: #0d1610; }
  .detail-info { padding: 20px; }
  .detail-name { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; }
  .detail-sub { font-size: 13px; color: #5a8a62; margin-bottom: 16px; }
  .detail-price { font-size: 32px; font-weight: 900; color: #2ecc40; margin-bottom: 4px; }
  .detail-price.consultar { font-size: 24px; color: #c7963a; }
  .detail-iva { font-size: 12px; color: #5a8a62; margin-bottom: 20px; }
  .detail-spec { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a7a3a22; }
  .spec-label { font-size: 13px; color: #5a8a62; }
  .spec-val { font-size: 14px; font-weight: 700; color: #d4e5d7; }
  .other-title { font-size: 16px; font-weight: 700; color: #c8dccb; margin: 24px 0 12px; }
  .qty-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #1a7a3a33; }
  .qty-label { font-size: 14px; font-weight: 700; color: #d4e5d7; margin-bottom: 10px; }
  .qty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .qty-btn {
    width: 44px; height: 44px; border-radius: 8px; border: 1px solid #1a7a3a;
    background: #0d1610; color: #2ecc40; font-size: 22px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: inherit; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .qty-btn:hover { background: #1a7a3a33; }
  .qty-btn:active { background: #1a7a3a55; }
  .qty-btn:disabled { opacity: 0.3; cursor: default; }
  .qty-display { font-size: 24px; font-weight: 800; color: #fff; min-width: 50px; text-align: center; }
  .qty-total { font-size: 14px; color: #5a8a62; margin-left: auto; }
  .qty-total span { color: #2ecc40; font-weight: 800; font-size: 18px; }
  .add-cart-btn {
    width: 100%; padding: 16px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, #1a7a3a, #2ecc40); color: #fff;
    font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit;
    transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
    -webkit-tap-highlight-color: transparent;
  }
  .add-cart-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px #2ecc4044; }
  .add-cart-btn:active { transform: translateY(0); }
  .add-cart-btn:disabled { background: #333; color: #666; cursor: default; transform: none; box-shadow: none; }
  .added-msg { text-align: center; padding: 10px; color: #2ecc40; font-weight: 700; font-size: 14px; margin-top: 8px; animation: fadeIn 0.3s ease-out; }
  .cart-empty { text-align: center; padding: 60px 20px; }
  .cart-empty-icon { font-size: 64px; margin-bottom: 16px; display: block; opacity: 0.4; }
  .cart-empty-text { font-size: 18px; color: #5a8a62; font-weight: 700; margin-bottom: 8px; }
  .cart-empty-sub { font-size: 14px; color: #3a5a40; }
  .cart-item { background: #111a14; border: 1px solid #1a7a3a22; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
  .cart-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .cart-item-name { font-size: 15px; font-weight: 700; color: #d4e5d7; }
  .cart-item-detail { font-size: 12px; color: #5a8a62; margin-top: 2px; }
  .cart-item-remove {
    background: none; border: none; color: #e74c3c; font-size: 13px;
    cursor: pointer; font-family: inherit; font-weight: 600; padding: 2px 6px;
    border-radius: 4px; transition: all 0.15s; flex-shrink: 0;
  }
  .cart-item-remove:hover { background: #e74c3c22; }
  .cart-item-bottom {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 12px; padding-top: 10px; border-top: 1px solid #1a7a3a15;
  }
  .cart-qty-mini { display: flex; align-items: center; gap: 8px; }
  .cart-qty-btn {
    width: 34px; height: 34px; border-radius: 6px; border: 1px solid #1a7a3a55;
    background: #0d1610; color: #2ecc40; font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: inherit; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .cart-qty-btn:hover { background: #1a7a3a33; border-color: #1a7a3a; }
  .cart-qty-num { font-size: 16px; font-weight: 800; color: #fff; min-width: 28px; text-align: center; }
  .cart-item-price { font-size: 18px; font-weight: 800; color: #2ecc40; }
  .cart-item-unit { font-size: 11px; color: #5a8a62; text-align: right; }
  .cart-summary {
    background: linear-gradient(135deg, #111a14, #162119); border: 1px solid #1a7a3a44;
    border-radius: 14px; padding: 20px; margin-top: 16px;
  }
  .cart-summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; }
  .cart-summary-label { color: #7a9a80; }
  .cart-summary-val { color: #d4e5d7; font-weight: 700; }
  .cart-total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0 0; margin-top: 10px; border-top: 2px solid #1a7a3a;
  }
  .cart-total-label { font-size: 18px; font-weight: 800; color: #fff; }
  .cart-total-val { font-size: 26px; font-weight: 900; color: #2ecc40; }
  .cart-iva-note { font-size: 12px; color: #5a8a62; text-align: right; margin-top: 4px; }
  .bcv-note {
    background: #1a3a2a; border: 1px solid #1a7a3a55; border-radius: 8px;

  .bcv-icon { font-size: 18px; flex-shrink: 0; }
  .bcv-text { font-size: 12px; color: #7a9a80; line-height: 1.4; }
  .bcv-text strong { color: #2ecc40; }

    background: linear-gradient(135deg, #1a7a3a, #2ecc40); color: #fff;
    font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit;
    transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; margin-top: 16px;
    -webkit-tap-highlight-color: transparent;
  }
  .cart-checkout-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px #2ecc4044; }
  .continue-btn {
    display: block; width: 100%; padding: 14px; border-radius: 10px;
    border: 1px solid #1a7a3a; background: none; color: #2ecc40;
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    text-align: center; margin-top: 12px; transition: all 0.15s;

  .continue-btn:hover { background: #1a7a3a22; }
  .cart-clear-btn {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e74c3c44;

  .cart-clear-btn:hover { background: #e74c3c15; border-color: #e74c3c; }

    align-items: center; justify-content: center; padding: 20px;

  .modal {

  .modal-title { font-size: 20px; font-weight: 800; color: #2ecc40; margin-bottom: 8px; }
  .modal-sub { font-size: 13px; color: #5a8a62; margin-bottom: 16px; line-height: 1.5; }
  .modal-summary {

  .modal-wa-btn {
    display: block; width: 100%; padding: 14px; border-radius: 10px; border: none;
    background: #25D366; color: #fff; font-size: 16px; font-weight: 800;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px; text-align: center; text-decoration: none;
  }
  .modal-wa-btn:hover { background: #20bd5a; }
  .modal-copy-btn {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1a7a3a;
    background: none; color: #2ecc40; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 10px; transition: all 0.15s;
  }
  .modal-copy-btn:hover { background: #1a7a3a22; }
  .modal-close {
    width: 100%; padding: 10px; border: none; background: none;
    color: #5a8a62; font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 8px;
  }
  .copied-toast { color: #2ecc40; font-size: 13px; text-align: center; margin-top: 6px; font-weight: 600; animation: fadeIn 0.2s ease-out; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px; background: none;
    border: none; color: #2ecc40; font-size: 14px; font-weight: 700;
    cursor: pointer; padding: 0; margin-bottom: 16px; font-family: inherit;
  }
  .back-btn:hover { text-decoration: underline; }
  .search-result {
    padding: 10px 12px; background: #111a14; border-radius: 8px;
    margin-bottom: 6px; cursor: pointer; border: 1px solid #1a7a3a22; transition: all 0.15s;
  }
  .search-result:hover { border-color: #1a7a3a; }
  .sr-row { display: flex; justify-content: space-between; align-items: center; }
  .sr-name { font-size: 14px; font-weight: 700; color: #d4e5d7; }
  .sr-sub { font-size: 12px; color: #5a8a62; }
  .search-count { font-size: 13px; color: #5a8a62; margin-bottom: 12px; }
  .view-all-btn {
    background: #1a7a3a33; border: 1px solid #1a7a3a; color: #2ecc40;
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
    font-weight: 600; font-family: inherit;
  }
  .footer { text-align: center; padding: 24px 16px; border-top: 1px solid #1a7a3a22; margin-top: 20px; }
  .footer p { font-size: 12px; color: #3a5a40; margin-bottom: 4px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease-out; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
  .pop { animation: pop 0.3s ease-out; }
  .group-block { margin-bottom: 20px; }
</style>
</head>

  const[sr,setSr]=useState([]);
  const[showS,setShowS]=useState(false);
  const[cart,setCart]=useState([]);
  const[qty,setQty]=useState(1);
  const[addedMsg,setAddedMsg]=useState(false);
  const[showModal,setShowModal]=useState(false);
  const[copied,setCopied]=useState(false);
  const[badgePop,setBadgePop]=useState(false);
  const[bcvRate,setBcvRate]=useState(null);
  const[pricesLoaded,setPricesLoaded]=useState(false);
  const top=useRef(null);

  // Load live prices from precios.json (generated by GitHub Actions from Google Sheet)
  useEffect(()=>{
    fetch('precios.json?t='+Date.now()).then(r=>{if(!r.ok)throw new Error();return r.json();}).then(data=>{
      if(data.tasa_bcv)setBcvRate(data.tasa_bcv);
      if(data.categories){
        Object.entries(data.categories).forEach(([catKey,sections])=>{
          const cat=P[catKey];if(!cat)return;
          sections.forEach(section=>{
            Object.entries(cat.subcategories).forEach(([sKey,sub])=>{
              if(sub.name===section.title){
                section.groups.forEach((jGroup,gi)=>{
                  const matchGroup=sub.groups.find(g=>g.label===jGroup.label);
                  if(matchGroup){
                    jGroup.items.forEach(jItem=>{
                      const match=matchGroup.items.find(i=>i.size===jItem.size&&i.dim===jItem.dim);
                      if(match)match.price=jItem.price;
                    });
                  }
                });
              }
            });
          });
        });
      }
      setPricesLoaded(true);
    }).catch(()=>{/* precios.json not found, use hardcoded defaults */});
  },[]);

  const go=()=>top.current?.scrollIntoView({behavior:"smooth"});
  const home=()=>{setV(V.HOME);setGk(null);setSk(null);setSel(null);setQ("");setShowS(false);go();};
  const goG=(k)=>{setGk(k);setV(V.GROUP);go();};
  const goS=(g,s)=>{setGk(g);setSk(s);setV(V.SUB);go();};
  const goP=(g,s,gi,pi)=>{setGk(g);setSk(s);setSel({gi,pi});setQty(1);setAddedMsg(false);setV(V.PROD);go();};
  const goCart=()=>{setV(V.CART);setShowS(false);go();};

  const cartCount=cart.reduce((a,c)=>a+c.qty,0);
  const cartTotal=cart.reduce((a,c)=>a+c.price*c.qty,0);

  const addToCart=(subName,item,quantity,gKey,sKey)=>{
    const id=`${sKey}-${item.size}-${item.dim}`;
    setCart(prev=>{
      const ex=prev.find(c=>c.id===id);
      if(ex) return prev.map(c=>c.id===id?{...c,qty:c.qty+quantity}:c);
      return[...prev,{id,subName,size:item.size,dim:item.dim,price:item.price,qty:quantity}];
    });
    setAddedMsg(true);setBadgePop(true);
    setTimeout(()=>setAddedMsg(false),2000);
    setTimeout(()=>setBadgePop(false),400);
  };

  const updateCartQty=(id,d)=>setCart(prev=>prev.map(c=>{if(c.id!==id)return c;const n=c.qty+d;return n>0?{...c,qty:n}:c;}));
  const removeFromCart=(id)=>setCart(prev=>prev.filter(c=>c.id!==id));
  const clearCart=()=>setCart([]);

  const buildOrderText=()=>{
    let t="🛒 *Pedido LADA*\n━━━━━━━━━━━━━━\n";
    cart.forEach((c,i)=>{
      const sub=(c.price*c.qty);
      t+=`\n${i+1}. *${c.subName}*\n   ${c.size} — ${c.dim}\n   ${c.qty} pza × $${c.price} = *$${sub.toLocaleString("es-VE",{minimumFractionDigits:2})}*\n`;
    });
    t+=`\n━━━━━━━━━━━━━━\n*TOTAL: $${cartTotal.toLocaleString("es-VE",{minimumFractionDigits:2})}*\n(IVA incluido)\nProductos: ${cartCount} pza`;
    return t;
  };

  useEffect(()=>{
    if(!q.trim()){setSr([]);return;}
    const t=q.toLowerCase();const r=[];
    Object.entries(P).forEach(([gKey,group])=>{
      Object.entries(group.subcategories).forEach(([sKey,sub])=>{
        sub.groups.forEach((g,gi)=>{
          g.items.forEach((item,pi)=>{
            if(item.size.toLowerCase().includes(t)||sub.name.toLowerCase().includes(t)||item.dim.toLowerCase().includes(t))
              r.push({gKey,sKey,gi,pi,item,subName:sub.name,gl:g.label});
          });
        });
      });
    });
    setSr(r.slice(0,20));
  },[q]);

  const fmt=(p)=>p===null?"Consultar":`$${p.toLocaleString("es-VE",{minimumFractionDigits:p%1!==0?2:0})}`;

  const renderHome=()=>(<div className="fade-in">
    <div className="home-intro"><p>Catálogo completo de productos de acero y construcción</p></div>
    {Object.entries(P).map(([key,g])=>{
      const cnt=Object.values(g.subcategories).reduce((a,s)=>a+s.groups.reduce((b,gr)=>b+gr.items.length,0),0);
      return(<div key={key} className="cat-card" onClick={()=>goG(key)}>
        <span className="cat-icon">{g.icon}</span>
        <div className="cat-row"><div><div className="cat-title">{g.name}</div><div className="cat-desc">{g.desc}</div></div><span className="badge">{cnt} productos</span></div>
      </div>);
    })}
  </div>);

  const renderGroup=()=>{const g=P[gk];if(!g)return null;return(<div className="fade-in">
    <button className="back-btn" onClick={home}>← Categorías</button>
    <h2 className="section-title">{g.icon} {g.name}</h2>
    {Object.entries(g.subcategories).map(([sKey,sub])=>{
      const cnt=sub.groups.reduce((a,gr)=>a+gr.items.length,0);
      return(<div key={sKey} className="sub-card" onClick={()=>goS(gk,sKey)}>
        <Img type={sub.image} sz={64}/><div style={{flex:1}}><div className="sub-name">{sub.name}</div><div className="sub-count">{cnt} opciones</div></div><span className="sub-arrow">›</span>
      </div>);
    })}
  </div>);};

  const renderSub=()=>{const g=P[gk];const sub=g?.subcategories[sk];if(!sub)return null;return(<div className="fade-in">
    <button className="back-btn" onClick={()=>goG(gk)}>← {g.name}</button>
    <div className="subcat-header"><Img type={sub.image} sz={72}/><h2 className="section-title">{sub.name}</h2></div>
    {sub.groups.map((gr,gi)=>(<div key={gi} className="group-block"><span className="group-label">{gr.label}</span>
      {gr.items.map((item,pi)=>(<div key={pi} className="product-row" onClick={()=>goP(gk,sk,gi,pi)}>
        <div><div className="p-size">{item.size}</div><div className="p-dim">{item.dim}</div></div>
        <div className={item.price!==null?"p-price":"p-price consultar"}>{fmt(item.price)}</div>
      </div>))}
    </div>))}
  </div>);};

  const renderProd=()=>{
    const g=P[gk];const sub=g?.subcategories[sk];if(!sub||!sel)return null;
    const gr=sub.groups[sel.gi];const item=gr?.items[sel.pi];if(!item)return null;
    const all=sub.groups.flatMap((x,gi)=>x.items.map((it,pi)=>({...it,gi,pi,gl:x.label})));
    const others=all.filter(x=>x.gi!==sel.gi||x.pi!==sel.pi);
    const canAdd=item.price!==null;
    const lineTotal=canAdd?item.price*qty:0;
    return(<div className="fade-in">
      <button className="back-btn" onClick={()=>goS(gk,sk)}>← {sub.name}</button>
      <div className="detail-box">
        <div className="detail-img"><Img type={sub.image} sz={200}/></div>
        <div className="detail-info">
          <h2 className="detail-name">{sub.name}</h2>
          <p className="detail-sub">{item.size} — {item.dim}</p>
          <div className={item.price!==null?"detail-price":"detail-price consultar"}>{fmt(item.price)}</div>
          <p className="detail-iva">IVA incluido · por unidad{bcvRate&&item.price!==null&&<span style={{display:"block",marginTop:4,color:"#7a9a80"}}> ≈ {(item.price*bcvRate).toLocaleString("es-VE",{minimumFractionDigits:2})} Bs (Tasa BCV: {bcvRate.toLocaleString("es-VE",{minimumFractionDigits:2})})</span>}</p>
          <div className="detail-spec"><span className="spec-label">Medida</span><span className="spec-val">{item.size}</span></div>
          <div className="detail-spec"><span className="spec-label">Dimensión / Largo</span><span className="spec-val">{item.dim}</span></div>
          <div className="detail-spec"><span className="spec-label">Grupo</span><span className="spec-val">{gr.label}</span></div>
          <div className="detail-spec"><span className="spec-label">Categoría</span><span className="spec-val">{g.name}</span></div>
          <div className="qty-section">
            <div className="qty-label">Cantidad (piezas)</div>
            <div className="qty-row">
              <button className="qty-btn" onClick={()=>setQty(Math.max(1,qty-1))} disabled={qty<=1}>−</button>
              <span className="qty-display">{qty}</span>
              <button className="qty-btn" onClick={()=>setQty(qty+1)}>+</button>
              {canAdd&&<div className="qty-total">Total: <span>${lineTotal.toLocaleString("es-VE",{minimumFractionDigits:lineTotal%1!==0?2:0})}</span></div>}
            </div>
            <button className="add-cart-btn" disabled={!canAdd} onClick={()=>canAdd&&addToCart(sub.name,item,qty,gk,sk)}>
              {canAdd?`🛒 Agregar ${qty} al carrito`:"Precio no disponible"}
            </button>
            {addedMsg&&<div className="added-msg">✓ Agregado al carrito</div>}
          </div>
        </div>
      </div>
      {others.length>0&&<><h3 className="other-title">Otras medidas disponibles</h3>
        {others.slice(0,10).map((o,i)=>(<div key={i} className="product-row" onClick={()=>goP(gk,sk,o.gi,o.pi)}>
          <div><div className="p-size">{o.size}</div><div className="p-dim">{o.dim} — {o.gl}</div></div>
          <div className={o.price!==null?"p-price":"p-price consultar"}>{fmt(o.price)}</div>
        </div>))}
        {others.length>10&&<div style={{textAlign:"center",padding:12}}><button className="view-all-btn" onClick={()=>goS(gk,sk)}>Ver todas las {all.length} opciones</button></div>}
      </>}
    </div>);
  };

  const renderCart=()=>(<div className="fade-in">
    <button className="back-btn" onClick={home}>← Volver al catálogo</button>
    <h2 className="section-title">🛒 Mi Carrito</h2>
    {cart.length===0?(<div className="cart-empty">
      <span className="cart-empty-icon">🛒</span>
      <div className="cart-empty-text">Tu carrito está vacío</div>
      <div className="cart-empty-sub">Agrega productos desde el catálogo</div>
      <button className="continue-btn" onClick={home} style={{marginTop:24,maxWidth:250,marginLeft:"auto",marginRight:"auto"}}>Explorar productos</button>
    </div>):(<>
      {cart.map((c)=>(<div key={c.id} className="cart-item">
        <div className="cart-item-top">
          <div><div className="cart-item-name">{c.subName}</div><div className="cart-item-detail">{c.size} — {c.dim}</div></div>
          <button className="cart-item-remove" onClick={()=>removeFromCart(c.id)}>✕ Quitar</button>
        </div>
        <div className="cart-item-bottom">
          <div className="cart-qty-mini">
            <button className="cart-qty-btn" onClick={()=>updateCartQty(c.id,-1)} disabled={c.qty<=1}>−</button>
            <span className="cart-qty-num">{c.qty}</span>
            <button className="cart-qty-btn" onClick={()=>updateCartQty(c.id,1)}>+</button>
          </div>
          <div>
            <div className="cart-item-price">${(c.price*c.qty).toLocaleString("es-VE",{minimumFractionDigits:2})}</div>
            <div className="cart-item-unit">{c.qty} × ${c.price.toLocaleString("es-VE",{minimumFractionDigits:c.price%1!==0?2:0})}</div>
          </div>
        </div>
      </div>))}
      <div className="cart-summary">
        <div className="cart-summary-row"><span className="cart-summary-label">Productos</span><span className="cart-summary-val">{cartCount} pza</span></div>
        <div className="cart-summary-row"><span className="cart-summary-label">Artículos diferentes</span><span className="cart-summary-val">{cart.length}</span></div>
        <div className="cart-total-row"><span className="cart-total-label">TOTAL</span><span className="cart-total-val">${cartTotal.toLocaleString("es-VE",{minimumFractionDigits:2})}</span></div>
        <div className="cart-iva-note">IVA incluido</div>
        <div className="bcv-note"><span className="bcv-icon">💱</span><div className="bcv-text">Precios sujetos a <strong>Tasa BCV</strong> del día.{bcvRate&&<> Tasa actual: <strong>{bcvRate.toLocaleString("es-VE",{minimumFractionDigits:2})} Bs/$</strong>.</>} El monto final en bolívares se calcula al momento de la compra según la tasa vigente del Banco Central de Venezuela.</div></div>
        <button className="cart-checkout-btn" onClick={()=>{setShowModal(true);setCopied(false);}}>📋 Enviar pedido</button>
        <button className="continue-btn" onClick={home}>Seguir comprando</button>
        <button className="cart-clear-btn" onClick={clearCart}>Vaciar carrito</button>
      </div>
    </>)}
  </div>);

  const renderSearch=()=>(<div className="fade-in">
    <p className="search-count">{sr.length} resultado{sr.length!==1?"s":""}</p>
    {sr.map((r,i)=>(<div key={i} className="search-result" onClick={()=>{setShowS(false);setQ("");goP(r.gKey,r.sKey,r.gi,r.pi);}}>
      <div className="sr-row"><div><div className="sr-name">{r.item.size}</div><div className="sr-sub">{r.subName} — {r.item.dim}</div></div>
      <div className={r.item.price!==null?"p-price":"p-price consultar"}>{fmt(r.item.price)}</div></div>
    </div>))}
  </div>);

  const renderModal=()=>{
    if(!showModal)return null;
    const text=buildOrderText();
    const waUrl=`https://wa.me/?text=${encodeURIComponent(text)}`;
    return(<div className="modal-overlay" onClick={()=>setShowModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">📋 Resumen del Pedido</div>
        <div className="modal-sub">Revisa tu pedido y envíalo por WhatsApp o copia el texto para compartir.</div>
        <div className="modal-summary">{text}</div>
        <a href={waUrl} target="_blank" rel="noopener noreferrer" className="modal-wa-btn">📱 Enviar por WhatsApp</a>
        <button className="modal-copy-btn" onClick={()=>{navigator.clipboard?.writeText(text);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>
          {copied?"✓ Copiado":"📋 Copiar al portapapeles"}
        </button>
        <button className="modal-close" onClick={()=>setShowModal(false)}>Cerrar</button>
      </div>
    </div>);
  };

  return(<div>
    <div ref={top}/>
    <header className="header">
      <div className="header-top">
        <div><div className="logo" onClick={home}>LADA</div><div className="subtitle">Materiales y Construcción</div></div>
        <div className="header-actions">
          <button className={`icon-btn ${showS?"active":""}`} onClick={()=>{setShowS(!showS);setQ("");if(v===V.CART)setV(V.HOME);}}>{showS?"✕":"🔍"}</button>
          <button className={`icon-btn ${v===V.CART?"active":""}`} onClick={goCart}>
            🛒{cartCount>0&&<span className={`cart-badge ${badgePop?"pop":""}`}>{cartCount}</span>}
          </button>
        </div>
      </div>
      {showS&&<input className="search-box" placeholder='Buscar producto... ej: "1/2", "3mm", "SCH40"' value={q} onChange={e=>setQ(e.target.value)} autoFocus/>}
      {!showS&&v!==V.HOME&&v!==V.CART&&(<nav className="nav">
        <button className="nav-btn active" onClick={home}>Inicio</button>
        {gk&&<><span className="nav-sep">›</span><button className="nav-btn" onClick={()=>goG(gk)}>{P[gk]?.name}</button></>}
        {sk&&v>=V.SUB&&<><span className="nav-sep">›</span><button className="nav-btn" onClick={()=>goS(gk,sk)}>{P[gk]?.subcategories[sk]?.name}</button></>}
      </nav>)}
    </header>
    <main className="body">
      {showS&&q.trim()?renderSearch():<>
        {v===V.HOME&&renderHome()}
        {v===V.GROUP&&renderGroup()}
        {v===V.SUB&&renderSub()}
        {v===V.PROD&&renderProd()}
        {v===V.CART&&renderCart()}
      </>}
    </main>
    <div className="footer"><p>© 2026 LADA — Materiales y Construcción</p><p>Todos los precios incluyen IVA · Precios en USD sujetos a Tasa BCV</p>{bcvRate&&<p style={{color:"#2ecc40",marginTop:4}}>💱 Tasa BCV: {bcvRate.toLocaleString("es-VE",{minimumFractionDigits:2})} Bs/$</p>}</div>
    {renderModal()}
  </div>);
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
