<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catálogo Lada</title>
<meta name="description" content="Catálogo de productos de acero y construcción — LADA Venezuela" />
<meta name="theme-color" content="#0a0f0c" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  /* Theme variables */
  :root {
    --bg-body: #0a0f0c;
    --bg-card: #111a14;
    --bg-card-end: #162119;
    --bg-input: #111a14;
    --bg-header: #0d1a10;
    --bg-header-end: #132918;
    --bg-detail-img: #0d1610;
    --bg-row: #0d1610;
    --bg-row-alt: #0a1210;
    --bg-row-hover: #121e16;
    --bg-row-hover-strong: #162119;
    --bg-overlay: rgba(0,0,0,0.85);
    --bg-bcv: #1a3a2a;
    --bg-accent-subtle: #1a7a3a22;
    --bg-accent-hover: #1a7a3a33;
    --bg-accent-active: #1a7a3a55;
    --c-accent: #2ecc40;
    --c-accent-dark: #1a7a3a;
    --c-accent-border: #1a7a3a33;
    --c-accent-border-half: #1a7a3a55;
    --c-accent-border-light: #1a7a3a22;
    --c-accent-border-faint: #1a7a3a15;
    --c-accent-border-min: #1a7a3a10;
    --c-text: #e8ede9;
    --c-text-strong: #fff;
    --c-text-mid: #d4e5d7;
    --c-text-soft: #c8dccb;
    --c-text-muted: #7a9a80;
    --c-text-dim: #5a8a62;
    --c-text-faint: #3a5a40;
    --c-danger: #e74c3c;
    --c-warn: #c7963a;
    --c-icon: #5ebd6e;
    --c-scrollbar: #1a7a3a55;
    --shadow-float: 0 2px 16px rgba(0,0,0,0.3);
    --shadow-hover: 0 8px 24px rgba(0,0,0,0.3);
  }

  /* Light theme */
  .light {
    --bg-body: #f0f5f1;
    --bg-card: #ffffff;
    --bg-card-end: #f4f9f5;
    --bg-input: #ffffff;
    --bg-header: #e8f0ea;
    --bg-header-end: #dceadf;
    --bg-detail-img: #e4ede6;
    --bg-row: #f7faf8;
    --bg-row-alt: #f0f5f1;
    --bg-row-hover: #e8f0ea;
    --bg-row-hover-strong: #dceadf;
    --bg-overlay: rgba(0,0,0,0.5);
    --bg-bcv: #e0f0e4;
    --bg-accent-subtle: #1a7a3a15;
    --bg-accent-hover: #1a7a3a22;
    --bg-accent-active: #1a7a3a33;
    --c-accent: #1a8a3a;
    --c-accent-dark: #15712f;
    --c-accent-border: #1a7a3a33;
    --c-accent-border-half: #1a7a3a44;
    --c-accent-border-light: #1a7a3a22;
    --c-accent-border-faint: #1a7a3a15;
    --c-accent-border-min: #1a7a3a10;
    --c-text: #1a2e1f;
    --c-text-strong: #0a1a0e;
    --c-text-mid: #2a3e2e;
    --c-text-soft: #3a5040;
    --c-text-muted: #5a7a62;
    --c-text-dim: #6a8a70;
    --c-text-faint: #8aaa90;
    --c-danger: #d43b2e;
    --c-warn: #b8862a;
    --c-icon: #1a7a3a;
    --c-scrollbar: #1a7a3a44;
    --shadow-float: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-hover: 0 6px 20px rgba(0,0,0,0.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Archivo', 'Segoe UI', sans-serif;
    background: var(--bg-body);
    color: var(--c-text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s, color 0.3s;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-body); }
  ::-webkit-scrollbar-thumb { background: var(--c-scrollbar); border-radius: 3px; }
  input::placeholder { color: var(--c-text-faint); }
  input:focus { border-color: var(--c-accent-dark) !important; outline: none; }
  .app { max-width: 520px; margin: 0 auto; position: relative; min-height: 100vh; }
  .header {
    background: linear-gradient(135deg, var(--bg-header) 0%, var(--bg-header-end) 100%);
    border-bottom: 2px solid var(--c-accent-dark); padding: 14px 20px;
    position: sticky; top: 0; z-index: 100; transition: background 0.3s;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .logo { font-size: 28px; font-weight: 900; letter-spacing: 6px; color: var(--c-accent); text-transform: uppercase; cursor: pointer; }
  .subtitle { font-size: 11px; color: var(--c-text-dim); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    background: none; border: 1px solid var(--c-accent-border-half); color: var(--c-icon);
    padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 18px;
    transition: all 0.2s; position: relative;
  }
  .icon-btn:hover, .icon-btn.active { background: var(--bg-accent-hover); border-color: var(--c-accent-dark); color: var(--c-accent); }
  .cart-badge {
    position: absolute; top: -6px; right: -6px; background: var(--c-danger); color: #fff;
    font-size: 10px; font-weight: 800; min-width: 18px; height: 18px;
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
    padding: 0 4px; line-height: 1;
  }
  .search-box {
    width: 100%; padding: 10px 14px; background: var(--bg-input);
    border: 1px solid var(--c-accent-border-half); border-radius: 6px; color: var(--c-text);
    font-size: 14px; outline: none; margin-top: 10px; font-family: inherit; transition: background 0.3s, color 0.3s, border-color 0.3s;
  }
  .nav { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .nav-btn {
    background: none; border: 1px solid var(--c-accent-border-half); color: var(--c-icon);
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
    font-weight: 600; font-family: inherit; transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--c-accent-dark); }
  .nav-btn.active { background: var(--bg-accent-hover); border-color: var(--c-accent-dark); color: var(--c-accent); }
  .nav-sep { color: var(--c-accent-border-half); font-size: 12px; }
  .body { padding: 16px 16px 80px; }
  .home-intro { text-align: center; padding: 20px 0 28px; }
  .home-intro p { font-size: 15px; color: var(--c-text-muted); line-height: 1.5; }
  .cat-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-end) 100%);
    border: 1px solid var(--c-accent-border); border-radius: 12px; padding: 20px;
    margin-bottom: 12px; cursor: pointer; transition: all 0.2s;
  }
  .cat-card:hover { border-color: var(--c-accent-dark); transform: translateY(-2px); }
  .cat-card:active { transform: translateY(0); }
  .cat-icon { font-size: 36px; display: block; margin-bottom: 8px; }
  .cat-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .cat-title { font-size: 18px; font-weight: 800; color: var(--c-accent); margin-bottom: 4px; }
  .cat-desc { font-size: 13px; color: var(--c-text-muted); }
  .badge { background: var(--bg-accent-hover); color: var(--c-accent); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .sub-card {
    background: var(--bg-card); border: 1px solid var(--c-accent-border-light); border-radius: 10px;
    padding: 14px; margin-bottom: 10px; cursor: pointer;
    display: flex; align-items: center; gap: 14px; transition: all 0.2s;
  }
  .sub-card:hover { border-color: var(--c-accent-dark); }
  .sub-card:active { background: var(--bg-card-end); }
  .sub-name { font-size: 16px; font-weight: 700; color: var(--c-text-mid); }
  .sub-count { font-size: 12px; color: var(--c-text-dim); margin-top: 2px; }
  .sub-arrow { color: var(--c-accent-dark); font-size: 20px; flex-shrink: 0; }
  .section-title { font-size: 20px; font-weight: 800; color: var(--c-accent); margin-bottom: 16px; border-bottom: 2px solid var(--c-accent-border-half); padding-bottom: 8px; }
  .group-label { font-size: 13px; font-weight: 700; color: var(--c-accent-dark); background: var(--bg-accent-subtle); padding: 6px 12px; border-radius: 6px; margin-bottom: 10px; display: inline-block; }
  .subcat-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .subcat-header .section-title { margin: 0; border: none; padding: 0; }
  .product-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; background: var(--bg-row); border-radius: 8px;
    margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
  }
  .product-row:hover { border-color: var(--c-accent-border-half); background: var(--bg-row-hover); }
  .product-row:active { background: var(--bg-row-hover-strong); }
  .p-size { font-size: 14px; font-weight: 600; color: var(--c-text-mid); }
  .p-dim { font-size: 11px; color: var(--c-text-dim); margin-top: 2px; }
  .p-price { font-size: 16px; font-weight: 800; color: var(--c-accent); text-align: right; white-space: nowrap; }
  .p-price.consultar { font-size: 14px; font-weight: 700; color: var(--c-warn); font-style: italic; }
  .detail-box { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--c-accent-border); overflow: hidden; transition: background 0.3s; }
  .detail-img { display: flex; justify-content: center; padding: 24px; background: var(--bg-detail-img); transition: background 0.3s; }
  .detail-info { padding: 20px; }
  .detail-name { font-size: 22px; font-weight: 800; color: var(--c-text-strong); margin-bottom: 4px; }
  .detail-sub { font-size: 13px; color: var(--c-text-dim); margin-bottom: 16px; }
  .detail-price { font-size: 32px; font-weight: 900; color: var(--c-accent); margin-bottom: 4px; }
  .detail-price.consultar { font-size: 24px; color: var(--c-warn); }
  .detail-iva { font-size: 12px; color: var(--c-text-dim); margin-bottom: 20px; }
  .detail-spec { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--c-accent-border-light); }
  .spec-label { font-size: 13px; color: var(--c-text-dim); }
  .spec-val { font-size: 14px; font-weight: 700; color: var(--c-text-mid); }
  .other-title { font-size: 16px; font-weight: 700; color: var(--c-text-soft); margin: 24px 0 12px; }
  .qty-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--c-accent-border); }
  .qty-label { font-size: 14px; font-weight: 700; color: var(--c-text-mid); margin-bottom: 10px; }
  .qty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .qty-btn {
    width: 44px; height: 44px; border-radius: 8px; border: 1px solid var(--c-accent-dark);
    background: var(--bg-row); color: var(--c-accent); font-size: 22px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: inherit; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .qty-btn:hover { background: var(--bg-accent-hover); }
  .qty-btn:active { background: var(--bg-accent-active); }
  .qty-btn:disabled { opacity: 0.3; cursor: default; }
  .qty-display { font-size: 24px; font-weight: 800; color: var(--c-text-strong); min-width: 50px; text-align: center; }
  .qty-input {
    width: 80px; height: 44px; border-radius: 8px; border: 1px solid var(--c-accent-dark);
    background: var(--bg-input); color: var(--c-text-strong); font-size: 20px; font-weight: 800;
    text-align: center; font-family: inherit; outline: none; transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .qty-input:focus { border-color: var(--c-accent); }
  .qty-total { font-size: 14px; color: var(--c-text-dim); margin-left: auto; }
  .qty-total span { color: var(--c-accent); font-weight: 800; font-size: 18px; }
  .add-cart-btn {
    width: 100%; padding: 16px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--c-accent-dark), var(--c-accent)); color: #fff;
    font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit;
    transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
    -webkit-tap-highlight-color: transparent;
  }
  .add-cart-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(46,204,64,0.25); }
  .add-cart-btn:active { transform: translateY(0); }
  .add-cart-btn:disabled { background: #333; color: #666; cursor: default; transform: none; box-shadow: none; }
  .light .add-cart-btn:disabled { background: #ccc; color: #999; }
  .added-msg { text-align: center; padding: 10px; color: var(--c-accent); font-weight: 700; font-size: 14px; margin-top: 8px; animation: fadeIn 0.3s ease-out; }
  .cart-empty { text-align: center; padding: 60px 20px; }
  .cart-empty-icon { font-size: 64px; margin-bottom: 16px; display: block; opacity: 0.4; }
  .cart-empty-text { font-size: 18px; color: var(--c-text-dim); font-weight: 700; margin-bottom: 8px; }
  .cart-empty-sub { font-size: 14px; color: var(--c-text-faint); }
  .cart-item { background: var(--bg-card); border: 1px solid var(--c-accent-border-light); border-radius: 12px; padding: 16px; margin-bottom: 10px; transition: background 0.3s; }
  .cart-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .cart-item-name { font-size: 15px; font-weight: 700; color: var(--c-text-mid); }
  .cart-item-detail { font-size: 12px; color: var(--c-text-dim); margin-top: 2px; }
  .cart-item-remove {
    background: none; border: none; color: var(--c-danger); font-size: 13px;
    cursor: pointer; font-family: inherit; font-weight: 600; padding: 2px 6px;
    border-radius: 4px; transition: all 0.15s; flex-shrink: 0;
  }
  .cart-item-remove:hover { background: rgba(231,76,60,0.13); }
  .cart-item-bottom {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--c-accent-border-faint);
  }
  .cart-qty-mini { display: flex; align-items: center; gap: 8px; }
  .cart-qty-btn {
    width: 34px; height: 34px; border-radius: 6px; border: 1px solid var(--c-accent-border-half);
    background: var(--bg-row); color: var(--c-accent); font-size: 18px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: inherit; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .cart-qty-btn:hover { background: var(--bg-accent-hover); border-color: var(--c-accent-dark); }
  .cart-qty-num { font-size: 16px; font-weight: 800; color: var(--c-text-strong); min-width: 28px; text-align: center; }
  .cart-qty-input {
    width: 64px; height: 34px; border-radius: 6px; border: 1px solid var(--c-accent-border-half);
    background: var(--bg-input); color: var(--c-text-strong); font-size: 15px; font-weight: 800;
    text-align: center; font-family: inherit; outline: none; -moz-appearance: textfield;
  }
  .cart-qty-input::-webkit-outer-spin-button, .cart-qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .cart-qty-input:focus { border-color: var(--c-accent); }
  .cart-item-price { font-size: 18px; font-weight: 800; color: var(--c-accent); }
  .cart-item-unit { font-size: 11px; color: var(--c-text-dim); text-align: right; }
  .cart-summary {
    background: linear-gradient(135deg, var(--bg-card), var(--bg-card-end)); border: 1px solid var(--c-accent-border-half);
    border-radius: 14px; padding: 20px; margin-top: 16px; transition: background 0.3s;
  }
  .cart-summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; }
  .cart-summary-label { color: var(--c-text-muted); }
  .cart-summary-val { color: var(--c-text-mid); font-weight: 700; }
  .cart-total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0 0; margin-top: 10px; border-top: 2px solid var(--c-accent-dark);
  }
  .cart-total-label { font-size: 18px; font-weight: 800; color: var(--c-text-strong); }
  .cart-total-val { font-size: 26px; font-weight: 900; color: var(--c-accent); }
  .cart-iva-note { font-size: 12px; color: var(--c-text-dim); text-align: right; margin-top: 4px; }
  .bcv-note {
    background: var(--bg-bcv); border: 1px solid var(--c-accent-border-half); border-radius: 8px;
    padding: 10px 14px; margin-top: 12px; display: flex; align-items: center; gap: 8px; transition: background 0.3s;
  }
  .bcv-icon { font-size: 18px; flex-shrink: 0; }
  .bcv-text { font-size: 12px; color: var(--c-text-muted); line-height: 1.4; }
  .bcv-text strong { color: var(--c-accent); }
  .cart-checkout-btn {
    width: 100%; padding: 16px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--c-accent-dark), var(--c-accent)); color: #fff;
    font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit;
    transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; margin-top: 16px;
    -webkit-tap-highlight-color: transparent;
  }
  .cart-checkout-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(46,204,64,0.25); }
  .continue-btn {
    display: block; width: 100%; padding: 14px; border-radius: 10px;
    border: 1px solid var(--c-accent-dark); background: none; color: var(--c-accent);
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    text-align: center; margin-top: 12px; transition: all 0.15s;
  }
  .continue-btn:hover { background: var(--bg-accent-subtle); }
  .cart-clear-btn {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(231,76,60,0.27);
    background: none; color: var(--c-danger); font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all 0.15s; margin-top: 10px;
  }
  .cart-clear-btn:hover { background: rgba(231,76,60,0.08); border-color: var(--c-danger); }
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg-overlay); z-index: 200; display: flex;
    align-items: center; justify-content: center; padding: 20px;
    animation: fadeIn 0.2s ease-out;
  }
  .modal {
    background: var(--bg-card); border: 1px solid var(--c-accent-dark); border-radius: 16px;
    padding: 24px; max-width: 420px; width: 100%; max-height: 85vh; overflow-y: auto; transition: background 0.3s;
  }
  .modal-title { font-size: 20px; font-weight: 800; color: var(--c-accent); margin-bottom: 8px; }
  .modal-sub { font-size: 13px; color: var(--c-text-dim); margin-bottom: 16px; line-height: 1.5; }
  .modal-summary {
    background: var(--bg-row); border-radius: 10px; padding: 14px; margin-bottom: 16px;
    font-size: 12px; color: var(--c-text-mid); white-space: pre-wrap; line-height: 1.6;
    max-height: 220px; overflow-y: auto; border: 1px solid var(--c-accent-border-light); transition: background 0.3s;
  }
  .modal-wa-btn {
    display: block; width: 100%; padding: 14px; border-radius: 10px; border: none;
    background: #25D366; color: #fff; font-size: 16px; font-weight: 800;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px; text-align: center; text-decoration: none;
  }
  .modal-wa-btn:hover { background: #20bd5a; }
  .modal-copy-btn {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--c-accent-dark);
    background: none; color: var(--c-accent); font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 10px; transition: all 0.15s;
  }
  .modal-copy-btn:hover { background: var(--bg-accent-subtle); }
  .modal-pdf-btn {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--c-danger);
    background: none; color: var(--c-danger); font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 10px; transition: all 0.15s;
  }
  .modal-pdf-btn:hover { background: rgba(231,76,60,0.08); }
  .modal-validity {
    background: var(--bg-bcv); border: 1px solid var(--c-accent-border-half); border-radius: 8px;
    padding: 10px 14px; margin-top: 12px; font-size: 12px; color: var(--c-text-muted); line-height: 1.5;
  }
  .modal-validity strong { color: var(--c-accent); }
  .modal-close {
    width: 100%; padding: 10px; border: none; background: none;
    color: var(--c-text-dim); font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 8px;
  }

{c.s==="plate"&&<><rect x="30" y="50" width="140" height="100" rx="3" fill={`url(#${id})`}/><rect x="30" y="50" width="140" height="50" rx="3" fill={`url(#s${id})`}/></>}
{c.s==="sq"&&<><rect x="40" y="30" width="120" height="140" rx="4" fill={`url(#${id})`} stroke="#555" strokeWidth="2"/><rect x="55" y="45" width="90" height="110" rx="2" fill={c.bg}/></>}
{c.s==="re"&&<><rect x="30" y="45" width="140" height="110" rx="4" fill={`url(#${id})`} stroke="#555" strokeWidth="2"/><rect x="42" y="57" width="116" height="86" rx="2" fill={c.bg}/></>}
{c.s==="ro"&&<><ellipse cx="100" cy="100" rx="65" ry="65" fill={`url(#${id})`} stroke="#555" strokeWidth="2"/><ellipse cx="100" cy="100" rx="48" ry="48" fill={c.bg}/></>}
{c.s==="ib"&&<><rect x="40" y="40" width="120" height="16" rx="2" fill={`url(#${id})`}/><rect x="88" y="56" width="24" height="88" fill={`url(#${id})`}/><rect x="40" y="144" width="120" height="16" rx="2" fill={`url(#${id})`}/></>}
{c.s==="ub"&&<><rect x="40" y="40" width="16" height="120" fill={`url(#${id})`}/><rect x="40" y="144" width="120" height="16" rx="2" fill={`url(#${id})`}/><rect x="144" y="40" width="16" height="120" fill={`url(#${id})`}/></>}
{c.s==="rb"&&<>{[70,90,110,130].map((y,i)=><g key={i}><rect x="30" y={y} width="140" height="8" rx="4" fill={`url(#${id})`}/></g>)}</>}
{c.s==="bs"&&<><rect x="35" y="75" width="130" height="20" rx="2" fill={`url(#${id})`}/><rect x="35" y="100" width="130" height="20" rx="2" fill={`url(#${id})`}/></>}
{c.s==="br"&&<>{[80,105,130].map((y,i)=><ellipse key={i} cx="100" cy={y} rx="65" ry="7" fill={`url(#${id})`}/>)}</>}
{c.s==="an"&&<><rect x="50" y="40" width="16" height="120" fill={`url(#${id})`}/><rect x="50" y="144" width="100" height="16" fill={`url(#${id})`}/></>}
{c.s==="tr"&&<><rect x="30" y="60" width="140" height="8" fill={`url(#${id})`}/><rect x="30" y="132" width="140" height="8" fill={`url(#${id})`}/>{[50,80,110,140].map((x,i)=><line key={i} x1={x} y1="68" x2={x+(i%2===0?20:-20)} y2="132" stroke="#999" strokeWidth="3"/>)}</>}
{c.s==="fb"&&<>{[70,92,114].map((y,i)=><rect key={i} x="30" y={y} width="140" height="14" rx="1" fill={`url(#${id})`}/>)}</>}
{c.s==="cl"&&<>{Array.from({length:8}).map((_,i)=>Array.from({length:8}).map((_,j)=><polygon key={`${i}-${j}`} points={`${30+i*20},${40+j*17} ${40+i*20},${48+j*17} ${30+i*20},${56+j*17} ${20+i*20},${48+j*17}`} fill="none" stroke="#999" strokeWidth="1.2"/>))}</>}
{c.s==="bk"&&<><path d="M60,65 L55,150 L145,150 L140,65 Z" fill={`url(#${id})`} stroke="#555" strokeWidth="1.5"/><ellipse cx="100" cy="65" rx="40" ry="10" fill="#888"/><path d="M70,55 Q100,35 130,55" fill="none" stroke="#999" strokeWidth="3"/></>}
</svg>);}

const V={HOME:0,GROUP:1,SUB:2,PROD:3,CART:4};

function useIsDesktop(bp=1024){
  const[d,setD]=useState(typeof window!=='undefined'&&window.innerWidth>=bp);
  useEffect(()=>{const h=()=>setD(window.innerWidth>=bp);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[bp]);
  return d;
}

function Sidebar({currentGk,currentSk,onGoG,onGoS,onHome}){
  const[expanded,setExpanded]=useState(null);
  useEffect(()=>{if(currentGk)setExpanded(currentGk);},[currentGk]);
  return(
    <nav className="desktop-sidebar">
      <div className="sidebar-title" onClick={onHome}>Categorías</div>
      {Object.entries(P).map(([key,g])=>(
        <div key={key} className="sidebar-cat">
          <button className={`sidebar-cat-btn ${currentGk===key?'active':''}`} onClick={()=>{setExpanded(expanded===key?null:key);onGoG(key);}}>
            <span>{g.icon} {g.name}</span>
            <span className="sidebar-chevron">{expanded===key?'▾':'›'}</span>
          </button>
          {expanded===key&&(
            <div className="sidebar-subs">
              {Object.entries(g.subcategories).map(([sKey,sub])=>(
                <button key={sKey} className={`sidebar-sub-btn ${currentSk===sKey&&currentGk===key?'active':''}`} onClick={(e)=>{e.stopPropagation();onGoS(key,sKey);}}>{sub.name}</button>
              ))}
            </div>
          )}
        </div>
      ))}
    </nav>
  );
}

function App(){
  const[v,setV]=useState(V.HOME);
  const[gk,setGk]=useState(null);
  const[sk,setSk]=useState(null);
  const[sel,setSel]=useState(null);
  const[q,setQ]=useState("");
  const[sr,setSr]=useState([]);
  const[showS,setShowS]=useState(false);
  const[cart,setCart]=useState([]);
  const[qty,setQty]=useState(1);
  const[addedMsg,setAddedMsg]=useState(false);
  const[showModal,setShowModal]=useState(false);
  const[copied,setCopied]=useState(false);
  const[badgePop,setBadgePop]=useState(false);
  const[bcvRate,setBcvRate]=useState(null);
  const[pricesLoaded,setPricesLoaded]=useState(false);
  const[theme,setTheme]=useState('dark');
  const[tableQtys,setTableQtys]=useState({});
  const[mobileQtyOpen,setMobileQtyOpen]=useState(null);
  const[mobileQtyVal,setMobileQtyVal]=useState(1);
  const[currency,setCurrency]=useState(()=>{try{return localStorage.getItem('lada-currency')||null;}catch(e){return null;}});
  const[showCurrencyPopup,setShowCurrencyPopup]=useState(false);
  const[waTooltip,setWaTooltip]=useState(true);
  const top=useRef(null);
  const isDesktop=useIsDesktop();

  const toggleTheme=()=>{const next=theme==='dark'?'light':'dark';setTheme(next);document.documentElement.className=next==='light'?'light':'';};
  const selectCurrency=(c)=>{setCurrency(c);try{localStorage.setItem('lada-currency',c);}catch(e){}setShowCurrencyPopup(false);};
  const getTableQty=(key)=>tableQtys[key]===undefined?1:tableQtys[key];
  const setTableQty=(key,val)=>{if(val===''||val===''){setTableQtys(prev=>({...prev,[key]:''}));return;}const n=Math.max(1,Math.min(499,parseInt(val)||1));setTableQtys(prev=>({...prev,[key]:n}));};
  const addToTableQty=(key,amount)=>{const cur=typeof tableQtys[key]==='number'?tableQtys[key]:1;setTableQtys(prev=>({...prev,[key]:Math.min(499,cur+amount)}));};

  // Load live prices from precios.json (generated by GitHub Actions from Google Sheet)
  useEffect(()=>{
    fetch('precios.json?t='+Date.now()).then(r=>{if(!r.ok)throw new Error();return r.json();}).then(data=>{
      if(data.tasa_bcv)setBcvRate(data.tasa_bcv);
      if(data.categories){
        Object.entries(data.categories).forEach(([catKey,sections])=>{
          const cat=P[catKey];if(!cat)return;
          sections.forEach(section=>{
            Object.entries(cat.subcategories).forEach(([sKey,sub])=>{
              if(sub.name===section.title){
                section.groups.forEach((jGroup,gi)=>{
                  const matchGroup=sub.groups.find(g=>g.label===jGroup.label);
                  if(matchGroup){
                    jGroup.items.forEach(jItem=>{
                      const match=matchGroup.items.find(i=>i.size===jItem.size&&i.dim===jItem.dim);
                      if(match)match.price=jItem.price;
                    });
                  }
                });
              }
            });
          });
        });
      }
      setPricesLoaded(true);
    }).catch(()=>{/* precios.json not found, use hardcoded defaults */});
  },[]);

  useEffect(()=>{if(waTooltip){const t=setTimeout(()=>setWaTooltip(false),5000);return()=>clearTimeout(t);}},[waTooltip]);

  const go=()=>top.current?.scrollIntoView({behavior:"smooth"});
  const home=()=>{setV(V.HOME);setGk(null);setSk(null);setSel(null);setQ("");setShowS(false);setMobileQtyOpen(null);go();};
  const goG=(k)=>{setGk(k);setV(V.GROUP);setMobileQtyOpen(null);if(!currency)setShowCurrencyPopup(true);go();};
  const goS=(g,s)=>{setGk(g);setSk(s);setV(V.SUB);setMobileQtyOpen(null);go();};
  const goP=(g,s,gi,pi)=>{setGk(g);setSk(s);setSel({gi,pi});setQty(1);setAddedMsg(false);setV(V.PROD);setMobileQtyOpen(null);go();};
  const goCart=()=>{setV(V.CART);setShowS(false);go();};

  const cartCount=cart.reduce((a,c)=>a+(typeof c.qty==='number'?c.qty:0),0);
  const cartTotal=cart.reduce((a,c)=>a+c.price*(typeof c.qty==='number'?c.qty:0),0);

  const addToCart=(subName,item,quantity,gKey,sKey)=>{
    const id=`${sKey}-${item.size}-${item.dim}`;
    setCart(prev=>{
      const ex=prev.find(c=>c.id===id);
      if(ex) return prev.map(c=>c.id===id?{...c,qty:c.qty+quantity}:c);
      return[...prev,{id,subName,size:item.size,dim:item.dim,price:item.price,qty:quantity}];
    });
    setAddedMsg(true);setBadgePop(true);
    setTimeout(()=>setAddedMsg(false),2000);
    setTimeout(()=>setBadgePop(false),400);
  };

  const updateCartQty=(id,d)=>setCart(prev=>prev.map(c=>{if(c.id!==id)return c;const cur=typeof c.qty==='number'?c.qty:1;const n=Math.max(1,Math.min(499,cur+d));return{...c,qty:n};}));
  const removeFromCart=(id)=>setCart(prev=>prev.filter(c=>c.id!==id));
  const clearCart=()=>setCart([]);

  const buildOrderText=()=>{
    const cur=currency||'ref';
    const showBs=(cur==='bs'||cur==='ambas')&&bcvRate;
    let t="🛒 *Pedido LADA*\n━━━━━━━━━━━━━━\n";
    cart.forEach((c,i)=>{
      const q=typeof c.qty==='number'?c.qty:1;const sub=(c.price*q);
      let line=`${q} piezas × Referencia ${formatNum(c.price)} = *Referencia ${formatNum(sub)}*`;
      if(showBs)line+=`\n   (Bolívares ${formatNum(sub*bcvRate)})`;
      t+=`\n${i+1}. *${c.subName}*\n   ${c.size} — ${c.dim}\n   ${line}\n`;
    });
    let totalStr=`*TOTAL: Referencia ${formatNum(cartTotal)}*`;
    if(showBs)totalStr+=`\n(Bolívares ${formatNum(cartTotal*bcvRate)})`;
    t+=`\n━━━━━━━━━━━━━━\n${totalStr}\n(IVA incluido)\nProductos: ${cartCount} piezas`;
    if(bcvRate)t+=`\n\nTasa BCV: ${formatNum(bcvRate)} Bolívares por Referencia`;
    const v=getPriceValidity();
    t+=`\n\n⏰ ${v.note}`;
    return t;
  };

  const getPriceValidity=()=>{
    const now=new Date();
    const h=now.getHours();
    const pad=(n)=>String(n).padStart(2,'0');
    const fmtDate=(d)=>`${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
    const fmtTime=(d)=>{const hr=d.getHours();const ampm=hr>=12?'PM':'AM';const h12=hr%12||12;return`${h12}:${pad(d.getMinutes())} ${ampm}`;};
    if(h<17){
      return{validUntil:`hoy ${fmtDate(now)} a las 4:00 PM`,note:`Cotización generada el ${fmtDate(now)} a las ${fmtTime(now)}. Precios válidos hasta el cierre del día de hoy (4:00 PM).`};
    }else{
      const tomorrow=new Date(now);tomorrow.setDate(tomorrow.getDate()+1);
      return{validUntil:`${fmtDate(tomorrow)} a las 4:00 PM`,note:`Cotización generada el ${fmtDate(now)} a las ${fmtTime(now)} (después del cierre). Precios garantizados hasta el ${fmtDate(tomorrow)} a las 4:00 PM.`};
    }
  };

  const downloadPDF=()=>{
    const cur=currency||'ref';
    const showBs=(cur==='bs'||cur==='ambas')&&bcvRate;
    const validity=getPriceValidity();
    const now=new Date();
    const pad=(n)=>String(n).padStart(2,'0');
    const h12=now.getHours()%12||12;const ampm=now.getHours()>=12?'PM':'AM';
    const dateStr=`${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} ${h12}:${pad(now.getMinutes())} ${ampm}`;

    let rows='';
    cart.forEach((c,i)=>{
      const q=typeof c.qty==='number'?c.qty:1;const sub=c.price*q;
      let priceCell=`Referencia ${formatNum(c.price)}`;
      let totalCell=`Referencia ${formatNum(sub)}`;
      if(showBs){priceCell+=`<br><small style="color:#666">Bolívares ${formatNum(c.price*bcvRate)}</small>`;totalCell+=`<br><small style="color:#666">Bolívares ${formatNum(sub*bcvRate)}</small>`;}
      rows+=`<tr><td style="padding:8px;border-bottom:1px solid #ddd">${i+1}</td><td style="padding:8px;border-bottom:1px solid #ddd"><strong>${c.subName}</strong><br><span style="color:#555">${c.size} — ${c.dim}</span></td><td style="padding:8px;border-bottom:1px solid #ddd;text-align:center">${q}</td><td style="padding:8px;border-bottom:1px solid #ddd;text-align:right">${priceCell}</td><td style="padding:8px;border-bottom:1px solid #ddd;text-align:right"><strong>${totalCell}</strong></td></tr>`;
    });

    let totalDisplay=`Referencia ${formatNum(cartTotal)}`;
    if(showBs)totalDisplay+=`<br>Bolívares ${formatNum(cartTotal*bcvRate)}`;

    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pedido LADA - ${dateStr}</title><style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&display=swap');
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:'Archivo',sans-serif;color:#1a1a1a;padding:40px;max-width:800px;margin:0 auto}
      .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px;padding-bottom:20px;border-bottom:3px solid #1a7a3a}
      .logo{font-size:36px;font-weight:900;color:#1a7a3a;letter-spacing:6px}
      .subtitle{font-size:11px;color:#666;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
      .doc-info{text-align:right;font-size:12px;color:#555}
      .doc-info strong{color:#1a1a1a}
      h2{font-size:20px;color:#1a7a3a;margin-bottom:16px}
      table{width:100%;border-collapse:collapse;margin-bottom:24px}
      th{background:#1a7a3a;color:#fff;padding:10px 8px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:0.5px}
      th:nth-child(3),th:nth-child(4),th:nth-child(5){text-align:center}
      th:nth-child(4),th:nth-child(5){text-align:right}
      .total-section{text-align:right;padding:16px 0;border-top:3px solid #1a7a3a;margin-top:8px}
      .total-label{font-size:14px;color:#555}
      .total-val{font-size:24px;font-weight:900;color:#1a7a3a;line-height:1.4}
      .total-items{font-size:13px;color:#666;margin-top:4px}
      .validity{background:#f0f7f1;border:1px solid #c3e0c7;border-radius:8px;padding:16px;margin-top:24px;font-size:13px;color:#2a5a30}
      .validity strong{color:#1a7a3a}
      .footer-note{margin-top:24px;padding-top:16px;border-top:1px solid #ddd;font-size:11px;color:#888;text-align:center}
      .iva-note{font-size:12px;color:#666;text-align:right;margin-top:4px}
      ${showBs?'.bcv-info{font-size:12px;color:#666;text-align:right;margin-top:8px}':''}
      @media print{body{padding:20px}@page{margin:15mm}}
    </style></head><body>
    <div class="header">
      <div><div class="logo">LADA</div><div class="subtitle">Materiales y Construcción</div></div>
      <div class="doc-info"><strong>COTIZACIÓN</strong><br>Fecha: ${dateStr}<br>Productos: ${cartCount} piezas<br>Artículos: ${cart.length}</div>
    </div>
    <h2>Detalle del Pedido</h2>
    <table><thead><tr><th>#</th><th>Producto</th><th style="text-align:center">Cantidad</th><th style="text-align:right">Precio Unitario</th><th style="text-align:right">Subtotal</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="total-section">
      <div class="total-label">TOTAL</div>
      <div class="total-val">${totalDisplay}</div>
      <div class="total-items">${cartCount} piezas · ${cart.length} artículos diferentes</div>
      <div class="iva-note">IVA incluido</div>
      ${showBs?`<div class="bcv-info">Tasa BCV aplicada: ${formatNum(bcvRate)} Bolívares por Referencia</div>`:''}
    </div>
    <div class="validity">
      <strong>⏰ Vigencia de precios:</strong><br>
      ${validity.note}<br><br>
      <strong>Precios válidos hasta: ${validity.validUntil}</strong><br>
      Después de esta fecha y hora, los precios están sujetos a cambios según la tasa BCV vigente.
    </div>
    <div class="footer-note">
      LADA — Materiales y Construcción · Todos los precios incluyen IVA<br>
      Este documento es una cotización informativa. Para confirmar su pedido, comuníquese vía WhatsApp.
    </div>
    </body></html>`;

    const w=window.open('','_blank','width=800,height=600');
    if(w){w.document.write(html);w.document.close();setTimeout(()=>{w.print();},500);}
  };

  useEffect(()=>{
    if(!q.trim()){setSr([]);return;}
    const t=q.toLowerCase();const r=[];
    Object.entries(P).forEach(([gKey,group])=>{
      Object.entries(group.subcategories).forEach(([sKey,sub])=>{
        sub.groups.forEach((g,gi)=>{
          g.items.forEach((item,pi)=>{
            if(item.size.toLowerCase().includes(t)||sub.name.toLowerCase().includes(t)||item.dim.toLowerCase().includes(t))
              r.push({gKey,sKey,gi,pi,item,subName:sub.name,gl:g.label});
          });
        });
      });
    });
    setSr(r.slice(0,20));
  },[q]);

  const formatNum=(n)=>n.toLocaleString("es-VE",{minimumFractionDigits:n%1!==0?2:0});
  const formatPrice=(p,full)=>{
    if(p===null)return"Consultar";
    const cur=currency||'ref';
    const rl=full?'Referencia ':'Ref ';const bl=full?'Bolívares ':'Bs ';
    const refStr=rl+formatNum(p);
    if(cur==='ref')return refStr;
    const bsStr=bcvRate?bl+formatNum(p*bcvRate):(bl+'—');
    if(cur==='bs')return bsStr;
    return refStr+' / '+bsStr;
  };

  const totalProducts=Object.values(P).reduce((a,g)=>a+Object.values(g.subcategories).reduce((b,s)=>b+s.groups.reduce((c,gr)=>c+gr.items.length,0),0),0);
  const totalCats=Object.keys(P).length;

  const renderHome=()=>(<div className="fade-in">
    <div className="hero-banner">
      <h1>LADA</h1>
      <p>Catálogo completo de acero y materiales de construcción</p>
    </div>
    <div className="stats-bar">
      <div className="stat-item"><div className="stat-val">{totalProducts}</div><div className="stat-label">Productos</div></div>
      <div className="stat-item"><div className="stat-val">{totalCats}</div><div className="stat-label">Categorías</div></div>
    </div>
    <div className="home-intro"><p>Catálogo completo de productos de acero y construcción</p></div>
    <div className="cat-grid">
    {Object.entries(P).map(([key,g])=>{
      const cnt=Object.values(g.subcategories).reduce((a,s)=>a+s.groups.reduce((b,gr)=>b+gr.items.length,0),0);
      return(<div key={key} className="cat-card" onClick={()=>goG(key)}>
        <span className="cat-icon">{g.icon}</span>
        <div className="cat-row"><div><div className="cat-title">{g.name}</div><div className="cat-desc">{g.desc}</div></div><span className="badge">{cnt} productos</span></div>
      </div>);
    })}
    </div>
  </div>);

  const renderGroup=()=>{const g=P[gk];if(!g)return null;return(<div className="fade-in">
    <button className="back-btn hide-on-desktop" onClick={home}>← Categorías</button>
    <h2 className="section-title">{g.icon} {g.name}</h2>
    <div className="sub-grid">
    {Object.entries(g.subcategories).map(([sKey,sub])=>{
      const cnt=sub.groups.reduce((a,gr)=>a+gr.items.length,0);
      return(<div key={sKey} className="sub-card" onClick={()=>goS(gk,sKey)}>
        <Img type={sub.image} sz={isDesktop?80:64}/><div style={{flex:1}}><div className="sub-name">{sub.name}</div><div className="sub-count">{cnt} opciones</div></div><span className="sub-arrow">›</span>
      </div>);
    })}
    </div>
  </div>);};

  const renderSub=()=>{const g=P[gk];const sub=g?.subcategories[sk];if(!sub)return null;return(<div className="fade-in">
    <button className="back-btn hide-on-desktop" onClick={()=>goG(gk)}>← {g.name}</button>
    <div className="subcat-header"><Img type={sub.image} sz={isDesktop?100:72}/><h2 className="section-title">{sub.name}</h2></div>
    {isDesktop?(
      <table className="product-table" style={{display:'table'}}>
        <thead><tr><th>Medida</th><th>Dimensión</th><th>Grupo</th><th>Precio</th><th>Cantidad</th><th></th></tr></thead>
        <tbody>
        {sub.groups.map((gr,gi)=>(<React.Fragment key={gi}>
          <tr className="group-header-row"><td colSpan={6}>{gr.label}</td></tr>
          {gr.items.map((item,pi)=>{const qKey=`${sk}-${gi}-${pi}`;const tq=getTableQty(qKey);return(<tr key={pi} className="table-row" onClick={()=>goP(gk,sk,gi,pi)}>
            <td className="td-size">{item.size}</td>
            <td className="td-dim">{item.dim}</td>
            <td className="td-group">{gr.label}</td>
            <td className={item.price!==null?"td-price":"td-price consultar"}>{formatPrice(item.price)}</td>
            <td style={{textAlign:'center'}} onClick={e=>e.stopPropagation()}>{item.price!==null&&(<div>
              <div className="table-qty-wrap">
                <button className="table-qty-btn" onClick={()=>{const cur=typeof tq==='number'?tq:1;setTableQty(qKey,Math.max(1,cur-1));}} disabled={typeof tq==='number'&&tq<=1}>−</button>
                <input type="number" className="table-qty-input" value={tq} min="1" max="499" onChange={e=>{const v=e.target.value;if(v===''){setTableQty(qKey,'');return;}const n=parseInt(v);if(!isNaN(n))setTableQty(qKey,n);}} onClick={e=>e.stopPropagation()} onFocus={e=>{e.stopPropagation();e.target.select();}} onBlur={()=>{if(tq===''||tq<1)setTableQty(qKey,1);}}/>
                <button className="table-qty-btn" onClick={()=>{const cur=typeof tq==='number'?tq:1;setTableQty(qKey,Math.min(499,cur+1));}} disabled={typeof tq==='number'&&tq>=499}>+</button>
              </div>
              <div className="table-qty-presets">{[10,20,50,100].map(n=>(<button key={n} className="table-preset-btn" onClick={()=>addToTableQty(qKey,n)}>+{n}</button>))}</div>
            </div>)}</td>
            <td style={{textAlign:'center'}}><button className="table-action-btn" onClick={(e)=>{e.stopPropagation();const q=typeof tq==='number'?tq:1;if(item.price!==null)addToCart(sub.name,item,q,gk,sk);else goP(gk,sk,gi,pi);}}>{item.price!==null?`+ Agregar ${(typeof tq==='number'&&tq>1)?tq:''}`:"Ver"}</button></td>
          </tr>);})}
        </React.Fragment>))}
        </tbody>
      </table>
    ):(
      <div className="mobile-products">
      {sub.groups.map((gr,gi)=>(<div key={gi} className="group-block"><span className="group-label">{gr.label}</span>
        {gr.items.map((item,pi)=>{const mKey=`${sk}-${gi}-${pi}`;const isOpen=mobileQtyOpen===mKey;return(<React.Fragment key={pi}>
          <div className="product-row" style={isOpen?{borderRadius:'8px 8px 0 0',marginBottom:0,borderColor:'var(--c-accent-border)'}:{}} onClick={()=>goP(gk,sk,gi,pi)}>
            <div style={{flex:1,minWidth:0}}><div className="p-size">{item.size}</div><div className="p-dim">{item.dim}</div></div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div className={item.price!==null?"p-price":"p-price consultar"}>{formatPrice(item.price)}</div>
              {item.price!==null&&<button className="mobile-quick-add" onClick={e=>{e.stopPropagation();if(isOpen){setMobileQtyOpen(null);}else{setMobileQtyOpen(mKey);setMobileQtyVal(1);}}}>{isOpen?"✕":"🛒"}</button>}
            </div>
          </div>
          {isOpen&&item.price!==null&&(
            <div className="mobile-qty-panel" onClick={e=>e.stopPropagation()}>
              <div className="mobile-qty-presets">
                {[10,20,50,100].map(n=>(<button key={n} className="qty-preset-btn" onClick={()=>setMobileQtyVal(prev=>Math.min(499,(typeof prev==='number'?prev:1)+n))}>+{n}</button>))}
              </div>
              <div className="mobile-qty-row">
                <button className="qty-btn" onClick={()=>setMobileQtyVal(prev=>Math.max(1,(typeof prev==='number'?prev:1)-1))} disabled={mobileQtyVal<=1}>−</button>
                <input type="number" className="qty-input" value={mobileQtyVal} min="1" max="499" onChange={e=>{const v=e.target.value;if(v===''){setMobileQtyVal('');return;}const n=parseInt(v);if(!isNaN(n))setMobileQtyVal(Math.min(499,Math.max(1,n)));}} onBlur={()=>{if(mobileQtyVal===''||mobileQtyVal<1)setMobileQtyVal(1);}} onFocus={e=>e.target.select()}/>
                <button className="qty-btn" onClick={()=>setMobileQtyVal(prev=>Math.min(499,(typeof prev==='number'?prev:1)+1))} disabled={typeof mobileQtyVal==='number'&&mobileQtyVal>=499}>+</button>
              </div>
              <button className="mobile-qty-add-btn" onClick={()=>{const q=typeof mobileQtyVal==='number'?mobileQtyVal:1;addToCart(sub.name,item,q,gk,sk);setMobileQtyOpen(null);}}>🛒 Agregar {typeof mobileQtyVal==='number'?mobileQtyVal:1} al carrito</button>
            </div>
          )}
        </React.Fragment>);})}
      </div>))}
      </div>
    )}
  </div>);};

  const renderProd=()=>{
    const g=P[gk];const sub=g?.subcategories[sk];if(!sub||!sel)return null;
    const gr=sub.groups[sel.gi];const item=gr?.items[sel.pi];if(!item)return null;
    const all=sub.groups.flatMap((x,gi)=>x.items.map((it,pi)=>({...it,gi,pi,gl:x.label})));
    const others=all.filter(x=>x.gi!==sel.gi||x.pi!==sel.pi);
    const canAdd=item.price!==null;
    const qtyNum=typeof qty==='number'?qty:(parseInt(qty)||0);
    const lineTotal=canAdd?item.price*qtyNum:0;
    return(<div className="fade-in">
      <button className="back-btn hide-on-desktop" onClick={()=>goS(gk,sk)}>← {sub.name}</button>
      <div className="detail-box">
        <div className="detail-img"><Img type={sub.image} sz={isDesktop?300:200}/></div>
        <div className="detail-info">
          <h2 className="detail-name">{sub.name}</h2>
          <p className="detail-sub">{item.size} — {item.dim}</p>
          <div className={item.price!==null?"detail-price":"detail-price consultar"}>{formatPrice(item.price,true)}</div>
          <p className="detail-iva">IVA incluido · por unidad</p>
          <div className="detail-spec"><span className="spec-label">Medida</span><span className="spec-val">{item.size}</span></div>
          <div className="detail-spec"><span className="spec-label">Dimensión / Largo</span><span className="spec-val">{item.dim}</span></div>
          <div className="detail-spec"><span className="spec-label">Grupo</span><span className="spec-val">{gr.label}</span></div>
          <div className="detail-spec"><span className="spec-label">Categoría</span><span className="spec-val">{g.name}</span></div>
          <div className="qty-section">
            <div className="qty-label">Cantidad (piezas)</div>
            <div className="qty-presets">
              {[10,20,50,100].map(n=>(<button key={n} className="qty-preset-btn" onClick={()=>setQty(Math.min(499,qtyNum+n))}>+{n}</button>))}
            </div>
            <div className="qty-row">
              <button className="qty-btn" onClick={()=>setQty(Math.max(1,qtyNum-1))} disabled={qtyNum<=1}>−</button>
              <input type="number" className="qty-input" value={qty} min="1" max="499" onChange={e=>{const v=e.target.value;if(v===''){setQty('');return;}const n=parseInt(v);if(!isNaN(n)&&n>=0)setQty(Math.min(499,Math.max(1,n)));}} onBlur={()=>{if(qty===''||qty<1)setQty(1);}} onFocus={e=>e.target.select()}/>
              <button className="qty-btn" onClick={()=>setQty(Math.min(499,qtyNum+1))} disabled={qtyNum>=499}>+</button>
              {canAdd&&<div className="qty-total">Total: <span>{formatPrice(lineTotal,true)}</span></div>}
            </div>
            <button className="add-cart-btn" disabled={!canAdd||!qtyNum} onClick={()=>canAdd&&qtyNum&&addToCart(sub.name,item,qtyNum,gk,sk)}>
              {canAdd?`🛒 Agregar ${qtyNum||''} al carrito`:"Precio no disponible"}
            </button>
            {addedMsg&&<div className="added-msg">✓ Agregado al carrito</div>}
          </div>
        </div>
      </div>
      {others.length>0&&<><h3 className="other-title">Otras medidas disponibles</h3>
        {others.slice(0,10).map((o,i)=>(<div key={i} className="product-row" onClick={()=>goP(gk,sk,o.gi,o.pi)}>
          <div><div className="p-size">{o.size}</div><div className="p-dim">{o.dim} — {o.gl}</div></div>
          <div className={o.price!==null?"p-price":"p-price consultar"}>{formatPrice(o.price)}</div>
        </div>))}
        {others.length>10&&<div style={{textAlign:"center",padding:12}}><button className="view-all-btn" onClick={()=>goS(gk,sk)}>Ver todas las {all.length} opciones</button></div>}
      </>}
    </div>);
  };

  const renderCart=()=>(<div className="fade-in">
    <button className="back-btn" onClick={home}>← Volver al catálogo</button>
    <h2 className="section-title">🛒 Mi Carrito</h2>
    {cart.length===0?(<div className="cart-empty">
      <span className="cart-empty-icon">🛒</span>
      <div className="cart-empty-text">Tu carrito está vacío</div>
      <div className="cart-empty-sub">Agrega productos desde el catálogo</div>
      <button className="continue-btn" onClick={home} style={{marginTop:24,maxWidth:250,marginLeft:"auto",marginRight:"auto"}}>Explorar productos</button>
    </div>):(<div className="cart-layout">
      <div className="cart-items">
      {cart.map((c)=>(<div key={c.id} className="cart-item">
        <div className="cart-item-top">
          <div><div className="cart-item-name">{c.subName}</div><div className="cart-item-detail">{c.size} — {c.dim}</div></div>
          <button className="cart-item-remove" onClick={()=>removeFromCart(c.id)}>✕ Quitar</button>
        </div>
        <div className="cart-item-bottom">
          <div className="cart-qty-mini">
            <button className="cart-qty-btn" onClick={()=>updateCartQty(c.id,-1)} disabled={typeof c.qty!=='number'||c.qty<=1}>−</button>
            <input type="number" className="cart-qty-input" value={c.qty} min="1" max="499" onChange={e=>{const v=e.target.value;if(v===''){setCart(prev=>prev.map(x=>x.id===c.id?{...x,qty:''}:x));return;}const n=parseInt(v);if(!isNaN(n)&&n>=1)setCart(prev=>prev.map(x=>x.id===c.id?{...x,qty:Math.min(499,n)}:x));}} onBlur={e=>{const v=e.target.value;if(!v||parseInt(v)<1)setCart(prev=>prev.map(x=>x.id===c.id?{...x,qty:1}:x));}} onFocus={e=>e.target.select()}/>
            <button className="cart-qty-btn" onClick={()=>updateCartQty(c.id,1)} disabled={typeof c.qty==='number'&&c.qty>=499}>+</button>
          </div>
          <div>
            <div className="cart-item-price">{formatPrice(c.price*(typeof c.qty==='number'?c.qty:0),true)}</div>
            <div className="cart-item-unit">{typeof c.qty==='number'?c.qty:'—'} × {formatPrice(c.price,true)}</div>
          </div>
        </div>
      </div>))}
      </div>
      <div className="cart-sidebar">
      <div className="cart-summary">
        <div className="cart-summary-row"><span className="cart-summary-label">Productos</span><span className="cart-summary-val">{cartCount} piezas</span></div>
        <div className="cart-summary-row"><span className="cart-summary-label">Artículos diferentes</span><span className="cart-summary-val">{cart.length}</span></div>
        <div className="cart-total-row"><span className="cart-total-label">TOTAL</span><span className="cart-total-val">{formatPrice(cartTotal,true)}</span></div>
        <div className="cart-iva-note">IVA incluido</div>
        <button className="cart-checkout-btn" onClick={()=>{setShowModal(true);setCopied(false);}}>📋 Enviar pedido</button>
        <button className="modal-pdf-btn" onClick={downloadPDF} style={{marginTop:12}}>📄 Descargar PDF / Imprimir</button>
        <button className="continue-btn" onClick={home}>Seguir comprando</button>
        <button className="cart-clear-btn" onClick={()=>{if(window.confirm('¿Estás seguro que deseas vaciar el carrito? Se eliminarán todos los productos.'))clearCart();}}>Vaciar carrito</button>
      </div>
      </div>
    </div>)}
  </div>);

  const renderSearch=()=>(<div className="fade-in">
    <p className="search-count">{sr.length} resultado{sr.length!==1?"s":""}</p>
    {sr.map((r,i)=>(<div key={i} className="search-result" onClick={()=>{setShowS(false);setQ("");goP(r.gKey,r.sKey,r.gi,r.pi);}}>
      <div className="sr-row"><div><div className="sr-name">{r.item.size}</div><div className="sr-sub">{r.subName} — {r.item.dim}</div></div>
      <div className={r.item.price!==null?"p-price":"p-price consultar"}>{formatPrice(r.item.price)}</div></div>
    </div>))}
  </div>);

  const renderModal=()=>{
    if(!showModal)return null;
    const text=buildOrderText();
    const validity=getPriceValidity();
    const waUrl=`https://wa.me/?text=${encodeURIComponent(text)}`;
    return(<div className="modal-overlay" onClick={()=>setShowModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">📋 Resumen del Pedido</div>
        <div className="modal-sub">Revisa tu pedido y envíalo por WhatsApp, descárgalo como PDF, o copia el texto.</div>
        <div className="modal-summary">{text}</div>
        <div className="modal-validity"><strong>⏰ Vigencia de precios:</strong> {validity.note}</div>
        <a href={waUrl} target="_blank" rel="noopener noreferrer" className="modal-wa-btn">📱 Enviar por WhatsApp</a>
        <button className="modal-pdf-btn" onClick={downloadPDF}>📄 Descargar PDF / Imprimir</button>
        <button className="modal-copy-btn" onClick={()=>{navigator.clipboard?.writeText(text);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>
          {copied?"✓ Copiado":"📋 Copiar al portapapeles"}
        </button>
        <button className="modal-close" onClick={()=>setShowModal(false)}>Cerrar</button>
      </div>
    </div>);
  };

  const renderCurrencyPopup=()=>{
    if(!showCurrencyPopup)return null;
    const ex=70;const bsEx=bcvRate?(ex*bcvRate):31995.60;
    return(<div className="currency-popup-overlay" onClick={()=>{if(currency)setShowCurrencyPopup(false);}}>
      <div className="currency-popup" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Selecciona la moneda</div>
        <div className="modal-sub">Elige cómo deseas ver los precios en el catálogo.</div>
        <button className="currency-option" onClick={()=>selectCurrency('ref')}>
          <div className="currency-label">Precio Referencia</div>
          <div className="currency-example">Ejemplo: Referencia {formatNum(ex)}</div>
        </button>
        <button className="currency-option" onClick={()=>selectCurrency('bs')}>
          <div className="currency-label">Bolívares</div>
          <div className="currency-example">Ejemplo: Bolívares {formatNum(bsEx)}</div>
        </button>
        <button className="currency-option" onClick={()=>selectCurrency('ambas')}>
          <div className="currency-label">Mostrar ambas</div>
          <div className="currency-example">Ejemplo: Referencia {formatNum(ex)} / Bolívares {formatNum(bsEx)}</div>
        </button>
      </div>
    </div>);
  };

  const desktopSearchChange=(e)=>{setQ(e.target.value);if(!showS)setShowS(true);};
  const closeDesktopSearch=()=>{setQ("");};

  return(<div>
    <div ref={top}/>
    <header className="header">
      <div className="header-top">
        <div><div className="logo" onClick={home}>LADA</div><div className="subtitle">Materiales y Construcción</div></div>
        <div className="search-wrapper desktop-only">
          <input className="search-box" placeholder='Buscar producto... ej: "1/2", "3mm", "SCH40"' value={q} onChange={desktopSearchChange}/>
          {q.trim()&&sr.length>0&&(
            <div className="search-dropdown">
              <div style={{padding:'8px 12px',fontSize:12,color:'var(--c-text-dim)',borderBottom:'1px solid var(--c-accent-border-faint)'}}>{sr.length} resultado{sr.length!==1?'s':''}</div>
              {sr.map((r,i)=>(<div key={i} className="search-result" onClick={()=>{setShowS(false);setQ("");goP(r.gKey,r.sKey,r.gi,r.pi);}}>
                <div className="sr-row"><div><div className="sr-name">{r.item.size}</div><div className="sr-sub">{r.subName} — {r.item.dim}</div></div>
                <div className={r.item.price!==null?"p-price":"p-price consultar"}>{formatPrice(r.item.price)}</div></div>
              </div>))}
            </div>
          )}
        </div>
        <div className="header-actions">
          <button className="currency-toggle" onClick={()=>setShowCurrencyPopup(true)} title="Cambiar moneda">{(currency||'ref')==='ref'?'Ref':currency==='bs'?'Bs':'Ref/Bs'}</button>
          <button className="theme-toggle" onClick={toggleTheme} title={theme==='dark'?'Modo claro':'Modo oscuro'}>{theme==='dark'?'☀️':'🌙'}</button>
          <button className={`icon-btn mobile-only ${showS?"active":""}`} onClick={()=>{setShowS(!showS);setQ("");if(v===V.CART)setV(V.HOME);}}>{showS?"✕":"🔍"}</button>
          <button className={`icon-btn ${v===V.CART?"active":""}`} onClick={goCart}>
            🛒{cartCount>0&&<span className={`cart-badge ${badgePop?"pop":""}`}>{cartCount}</span>}
          </button>
          <span className="cart-label" onClick={goCart} style={{cursor:'pointer'}}>Mi Carrito</span>
        </div>
      </div>
      {showS&&<input className="search-box mobile-only" placeholder='Buscar producto... ej: "1/2", "3mm", "SCH40"' value={q} onChange={e=>setQ(e.target.value)} autoFocus/>}
      {(isDesktop||!showS)&&v!==V.HOME&&v!==V.CART&&(<nav className="nav">
        <button className="nav-btn active" onClick={home}>Inicio</button>
        {gk&&<><span className="nav-sep">›</span><button className="nav-btn" onClick={()=>goG(gk)}>{P[gk]?.name}</button></>}
        {sk&&v>=V.SUB&&<><span className="nav-sep">›</span><button className="nav-btn" onClick={()=>goS(gk,sk)}>{P[gk]?.subcategories[sk]?.name}</button></>}
      </nav>)}
    </header>
    <main className="body">
      {showS&&q.trim()&&!isDesktop?renderSearch():(
        <div className={v!==V.HOME&&v!==V.CART?"desktop-layout":""}>
          {v!==V.HOME&&v!==V.CART&&(
            <Sidebar currentGk={gk} currentSk={sk} onGoG={goG} onGoS={goS} onHome={home}/>
          )}
          <div className="desktop-content">
            {v===V.HOME&&renderHome()}
            {v===V.GROUP&&renderGroup()}
            {v===V.SUB&&renderSub()}
            {v===V.PROD&&renderProd()}
            {v===V.CART&&renderCart()}
          </div>
        </div>
      )}
    </main>
    <footer className="footer">
      <div className="footer-grid">
        <div className="footer-col"><div className="footer-logo">LADA</div><p className="footer-desc">Materiales y Construcción. Catálogo completo de productos de acero y materiales de construcción para la industria venezolana.</p></div>
        <div className="footer-col"><div className="footer-heading">Categorías</div>{Object.entries(P).map(([key,g])=>(<button key={key} className="footer-link" onClick={()=>goG(key)}>{g.icon} {g.name}</button>))}</div>
        <div className="footer-col"><div className="footer-heading">Contacto</div><p className="footer-link" style={{cursor:'default'}}>Consultas y pedidos</p><p className="footer-link" style={{cursor:'default'}}>por WhatsApp</p></div>
        <div className="footer-col"><div className="footer-copyright"><p>© 2026 LADA — Materiales y Construcción</p><p>Todos los precios incluyen IVA</p></div></div>
      </div>
      <div className="footer-copyright mobile-only"><p>© 2026 LADA — Materiales y Construcción</p><p>Todos los precios incluyen IVA</p></div>
    </footer>
    <a href="https://wa.me/584121234567" target="_blank" rel="noopener noreferrer" className="wa-float" onMouseEnter={()=>setWaTooltip(true)} title="WhatsApp">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      {waTooltip&&<span className="wa-tooltip">Contáctanos vía WhatsApp<span className="wa-dismiss" onClick={e=>{e.preventDefault();e.stopPropagation();setWaTooltip(false);}}>✕</span></span>}
    </a>
    {renderModal()}
    {renderCurrencyPopup()}
  </div>);
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
